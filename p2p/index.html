<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0b0b0b" />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' blob: data:; font-src 'none'; connect-src 'self' wss://manbesi.lv; media-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'self'; worker-src 'self'" />
    <title>Private workspace</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="workspace">
      <header class="topbar">
        <div class="presence" aria-live="polite">
          <span class="presence-dot" id="presence-dot"></span>
          <span id="presence-label">Connecting</span>
        </div>
      </header>

      <section class="pairing" id="pairing" hidden aria-live="polite">
        <div>
          <div class="pairing-label">Safety code</div>
          <output id="safety-code">Generating…</output>
          <p id="pairing-copy">Compare this code on both devices.</p>
        </div>
        <button id="approve-device" type="button" hidden disabled>Approve device</button>
      </section>

      <section class="text-space">
        <div class="text-status" id="sync-label">Waiting</div>
        <textarea
          id="shared-text" disabled
          aria-label="Shared text"
          maxlength="65536"
          spellcheck="true"
          autocomplete="off"
          placeholder="Paste or type here. It appears on the other device as you type."
        ></textarea>
      </section>

      <section class="file-space" id="file-space" aria-label="Send files" role="button" tabindex="0">
        <input id="file-input" type="file" multiple disabled />
        <div class="drop-copy" id="drop-copy">Click or drop files or folders here</div>
        <ul class="file-list" id="file-list"></ul>
        <div class="transfer" id="transfer" hidden>
          <div class="transfer-copy"><span id="transfer-label"></span><span id="transfer-value"></span></div>
          <div class="transfer-track"><span id="transfer-bar"></span></div>
        </div>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
